<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Warna Simpel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Preferensi Warna</h1>

        <fieldset>
            <legend>Warna</legend>
            
            <div class="input-group">
                <label for="bgInput">1. Warna latarbelakang</label>
                <input type="color" id="bgInput" value="#2c5d94">
            </div>

            <div class="input-group">
                <label for="textInput">2. Warna teks</label>
                <input type="color" id="textInput" value="#ff0000">
            </div>

        </fieldset>

        <button id="btnSimpan">Simpan</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Soal Pertama</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        Soal Pertama :)
    </div>

    <!-- BODY -->
    <div class="main">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h3>Menu</h3>
            <div class="line"></div>
            <p>Soal Pertama<br>Soal Kedua</p>

            <h3>Search</h3>
            <div class="line"></div>
            <input type="text" placeholder="Search this web">
            <button>GO!</button>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <h2>Tabel Sesuatu</h2>

            <div class="table-box">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Huruf</th>
                            <th>Keterangan</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>1</td><td>A</td><td>Pertama</td></tr>
                        <tr><td>2</td><td>B</td><td>Kedua</td></tr>
                        <tr><td>3</td><td>C</td><td>Ketiga</td></tr>
                    </tbody>
                </table>
                <div class="table-foot">
                    Data di atas adalah data fiktif
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>

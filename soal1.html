<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Soal Pertama</title>

    <style>
    
    body {
    background: #4D83AA;
    font-family: Arial, sans-serif;
    margin: 0;
}

.container {
    width: 800px;
    margin: 20px auto;
    background: #eee;
    border-radius: 8px;
    overflow: hidden;
}

.header {
    background: #E2D800;
    color: #032152;
    font-size: 32px;
    font-weight: bold;
    padding: 20px;
    text-align: center;
    border-top: 10px dotted #4D83AA;
}

.main {
    display: flex;
}

.sidebar {
    width: 300px;
    padding: 20px;
    color: #032152;
    border-right: 3px dotted #032152;
}

.sidebar h3 {
    margin-bottom: 5px;
}

.line {
    border-bottom: 2px dotted #032152;
    margin-bottom: 10px;
}

.sidebar input {
    padding: 5px;
    width: 180px;
}

.sidebar button {
    padding: 5px 10px;
}


.content {
    width: 500px;
    padding: 20px;
    color: #032152;
}

.content h2 {
    margin-top: 0;
    margin-bottom: 20px;
}


.table-box {
    background: #9CBCD0;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 4px 0 #032152;
}

table {
    width: 100%;
    border-collapse: collapse;
    text-align: center;
}

th, td {
    padding: 10px;
}

thead {
    background: #7FA6BD;
    color: #032152;
}

.table-foot {
    background: #e6eef2;
    padding: 10px;
    text-align: center;
    font-size: 14px;
}
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        Soal Pertama :)
    </div>

    <!-- BODY -->
    <div class="main">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h3>Menu</h3>
            <div class="line"></div>
            <p>Soal Pertama<br>Soal Kedua</p>

            <h3>Search</h3>
            <div class="line"></div>
            <input type="text" placeholder="Search this web">
            <button>GO!</button>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <h2>Tabel Sesuatu</h2>

            <div class="table-box">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Huruf</th>
                            <th>Keterangan</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>1</td><td>A</td><td>Pertama</td></tr>
                        <tr><td>2</td><td>B</td><td>Kedua</td></tr>
                        <tr><td>3</td><td>C</td><td>Ketiga</td></tr>
                    </tbody>
                </table>
                <div class="table-foot">
                    Data di atas adalah data fiktif
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
